# Neural Avatar Pipeline — Default Config

model:
  resolution: 128
  threshold: 0.0
  hidden_dim: 256

training:
  epochs: 50
  batch_size: 1024
  steps_per_epoch: 100
  learning_rate: 0.0005
  device: cuda

dataset:
  name: neuman
  data_root: data/
  split: train

rendering:
  near: 0.1
  far: 10.0
  n_samples: 64
  n_importance: 32

output:
  save_dir: outputs/
  save_every: 10
  mesh_resolution: 128
